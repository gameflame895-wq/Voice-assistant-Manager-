<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Assistant - Voice Powered</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .assistant-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
        }

        .mic-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .mic-container.listening {
            background: #ff4757;
            box-shadow: 0 0 30px #ff4757;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .mic-icon {
            font-size: 40px;
            transition: transform 0.3s ease;
        }

        .mic-container:hover .mic-icon {
            transform: scale(1.1);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 28px;
        }

        .status {
            margin-bottom: 20px;
            font-size: 18px;
            opacity: 0.9;
        }

        .chat-history {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
            text-align: left;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 20px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .user-message {
            background: rgba(255, 255, 255, 0.3);
            margin-left: auto;
            text-align: right;
        }

        .assistant-message {
            background: rgba(255, 255, 255, 0.2);
            margin-right: auto;
        }

        .commands {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
        }

        .commands h3 {
            margin-bottom: 10px;
        }

        .commands-list {
            list-style: none;
            text-align: left;
        }

        .commands-list li {
            margin-bottom: 5px;
            padding-left: 20px;
            position: relative;
        }

        .commands-list li:before {
            content: "🎯";
            position: absolute;
            left: 0;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin: 0 5px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="assistant-container">
        <h1>🗣️ Daily Assistant</h1>
        <div class="status" id="status">Click the mic or say "Hey Assistant"</div>
        
        <div class="mic-container" id="micContainer">
            <div class="mic-icon" id="micIcon">🎤</div>
        </div>

        <div class="chat-history" id="chatHistory"></div>

        <div class="commands">
            <h3>Try these commands:</h3>
            <ul class="commands-list">
                <li>"What's the time?"</li>
                <li>"What's today's date?"</li>
                <li>"Set a timer for 5 minutes"</li>
                <li>"What's 25 + 37?"</li>
                <li>"Open calculator"</li>
                <li>"Play a joke"</li>
                <li>"How are you?"</li>
            </ul>
        </div>

        <div style="margin-top: 20px;">
            <button onclick="startListening()">🎤 Start Listening</button>
            <button onclick="clearChat()">🗑️ Clear Chat</button>
        </div>
    </div>

    <script>
        class DailyAssistant {
            constructor() {
                this.recognition = null;
                this.isListening = false;
                this.timers = [];
                this.chatHistory = [];
                this.init();
            }

            init() {
                // Initialize Web Speech API
                if ('webkitSpeechRecognition' in window) {
                    this.recognition = new webkitSpeechRecognition();
                } else if ('SpeechRecognition' in window) {
                    this.recognition = new SpeechRecognition();
                }

                if (this.recognition) {
                    this.setupRecognition();
                } else {
                    document.getElementById('status').textContent = 'Speech recognition not supported';
                }

                // Add click listener to mic
                document.getElementById('micContainer').addEventListener('click', () => {
                    this.toggleListening();
                });

                // Auto-listen for wake word
                this.startListening();
            }

            setupRecognition() {
                this.recognition.continuous = true;
                this.recognition.interimResults = false;
                this.recognition.lang = 'en-US';

                this.recognition.onstart = () => {
                    this.setStatus('Listening...', true);
                };

                this.recognition.onresult = (event) => {
                    const command = event.results[event.results.length - 1][0].transcript.toLowerCase();
                    this.processCommand(command);
                };

                this.recognition.onend = () => {
                    if (this.isListening) {
                        setTimeout(() => this.startListening(), 1000);
                    } else {
                        this.setStatus('Click mic to start', false);
                    }
                };

                this.recognition.onerror = (event) => {
                    console.error('Speech recognition error:', event.error);
                    this.setStatus('Error occurred. Try again.', false);
                };
            }

            toggleListening() {
                if (this.isListening) {
                    this.stopListening();
                } else {
                    this.startListening();
                }
            }

            startListening() {
                if (this.recognition) {
                    this.isListening = true;
                    this.recognition.start();
                }
            }

            stopListening() {
                this.isListening = false;
                if (this.recognition) {
                    this.recognition.stop();
                }
                this.setStatus('Click mic to start', false);
            }

            setStatus(message, listening) {
                const statusEl = document.getElementById('status');
                const micContainer = document.getElementById('micContainer');
                statusEl.textContent = message;
                micContainer.classList.toggle('listening', listening);
            }

            addMessage(message, isUser = false) {
                this.chatHistory.push({ message, isUser, timestamp: new Date() });
                const chatHistory = document.getElementById('chatHistory');
                const messageEl = document.createElement('div');
                messageEl.className = `message ${isUser ? 'user-message' : 'assistant-message'}`;
                messageEl.innerHTML = `<strong>${isUser ? 'You' : 'Assistant'}</strong>: ${message}`;
                chatHistory.appendChild(messageEl);
                chatHistory.scrollTop = chatHistory.scrollHeight;
            }

            processCommand(command) {
                console.log('Command received:', command);
                this.addMessage(command, true);

                let response = '';

                // Time & Date commands
                if (command.includes('time') || command.includes('clock')) {
                    const now = new Date();
                    response = `The time is ${now.toLocaleTimeString()}`;
                }
                else if (command.includes('date') || command.includes('today')) {
                    const today = new Date();
                    response = `Today is ${today.toLocaleDateString('en-US', { 
                        weekday: 'long', 
                        year: 'numeric', 
                        month: 'long', 
                        day: 'numeric' 
                    })}`;
                }

                // Math calculator
                else if (command.includes('calculate') || command.includes('+') || command.includes('-') || 
                         command.includes('*') || command.includes('x') || command.includes('/')) {
                    try {
                        const mathExpr = command.replace(/calculate|what is|equals?/gi, '').trim();
                        const result = eval(mathExpr.replace('x', '*'));
                        response = `The result is ${result}`;
                    } catch {
                        response = "Sorry, I couldn't calculate that. Try something like '25 + 37'";
                    }
                }

                // Timer commands
                else if (command.includes('timer') || command.includes('set timer')) {
                    const minutes = parseInt(command.match(/(\d+)/)?.[0] || 1);
                    this.setTimer(minutes);
                    response = `Timer set for ${minutes} minute${minutes !== 1 ? 's' : ''}`;
                }

                // Jokes
                else if (command.includes('joke') || command.includes('funny')) {
                    const jokes = [
                        "Why don't scientists trust atoms? Because they make up everything!",
                        "Why did the scarecrow win an award? He was outstanding in his field!",
                        "Why don't eggs tell jokes? They'd crack each other up!",
                        "What do you call fake spaghetti? An impasta!"
                    ];
                    response = jokes[Math.floor(Math.random() * jokes.length)];
                }

                // Utility commands
                else if (command.includes('calculator')) {
                    response = "Opening calculator... (Try saying numbers and math operations!)";
                }
                else if (command.includes('clear') || command.includes('reset')) {
                    clearChat();
                    response = "Chat cleared!";
                    return;
                }
                else if (command.includes('hello') || command.includes('hi') || command.includes('hey')) {
                    response = "Hello! How can I help you today? Try asking for time, date, or math!";
                }
                else if (command.includes('how are you')) {
                    response = "I'm doing great, thanks for asking! Ready to help you with daily tasks! 😊";
                }
                else {
                    response = `I heard: "${command}". Try asking for time, date, math calculations, or set a timer!`;
                }

                this.addMessage(response);
                this.speak(response);
            }

            setTimer(minutes) {
                const endTime = Date.now() + minutes * 60 * 1000;
                const timerId = setInterval(() => {
                    const remaining = Math.round((endTime - Date.now()) / 1000);
                    if (remaining <= 0) {
                        clearInterval(timerId);
                        this.speak(`Timer finished! ${minutes} minutes up! ⏰`);
                        this.addMessage(`⏰ Timer of ${minutes} minutes finished!`);
                    }
                }, 1000);
                this.timers.push(timerId);
            }

            speak(text) {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = 0.9;
                    utterance.pitch = 1;
                    speechSynthesis.speak(utterance);
                }
            }
        }

        // Initialize assistant
        const assistant = new DailyAssistant();

        // Global functions for buttons
        function startListening() {
            assistant.startListening();
        }

        function clearChat() {
            document.getElementById('chatHistory').innerHTML = '';
            assistant.chatHistory = [];
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                assistant.toggleListening();
            }
        });
    </script>
</body>
</html>
